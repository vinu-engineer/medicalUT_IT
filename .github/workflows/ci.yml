# =====================================================================
# CI — Patient Vital Signs Monitor
# Runs on every push to main and every pull request targeting main.
#
# Strategy: Windows-only (Win32 GUI), MinGW-w64 toolchain, Ninja
# generator (faster than MinGW Makefiles in CI).
#
# What is validated:
#   • CMake configure (GTest fetched from GitHub via FetchContent)
#   • Build: test_unit + test_integration targets
#   • Run: all 305 GTest cases; any failure fails the workflow
#   • Test result summary written to the Actions job summary page
#   • Test result XML uploaded as artifact (IEC 62304 audit trail)
#
# IEC 62304 relevance:
#   SWR-VIT-001..007, SWR-ALT-001..004, SWR-PAT-001..006,
#   SWR-GUI-001/002, SWR-SEC-001..003, SWR-GUI-007
# =====================================================================

name: CI — Build & Test

on:
  workflow_dispatch:  # Pipeline handles push/PR triggers

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # use Node.js 24 for all actions

jobs:
  build-and-test:
    name: Windows / MinGW-w64 / 305 tests
    runs-on: windows-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Source
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Cache GTest FetchContent download
      #    Key on CMakeLists.txt so the cache is busted if GTest version
      #    or fetch parameters change.
      # ------------------------------------------------------------------
      - name: Cache GTest (FetchContent)
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: gtest-${{ github.repository }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: gtest-${{ github.repository }}-

      # ------------------------------------------------------------------
      # 3. Ensure FetchContent can clone GTest
      #    (same fix as build.bat — avoids "dubious ownership" error)
      # ------------------------------------------------------------------
      - name: Fix git safe.directory
        shell: bash
        run: git config --global --add safe.directory "*"

      # ------------------------------------------------------------------
      # 4. Configure
      #    Ninja is used in CI (pre-installed on windows-latest; faster
      #    than MinGW Makefiles and avoids mingw32-make PATH issues).
      #    The GUI target is excluded (BUILD_TESTS=ON only) — Win32
      #    painting code needs a live display for meaningful testing and
      #    is covered by structured GUI demo per IEC 62304 §5.6.3.
      # ------------------------------------------------------------------
      - name: CMake configure
        shell: bash
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_TESTS=ON \
            -Wno-dev

      # ------------------------------------------------------------------
      # 5. Build test executables only
      # ------------------------------------------------------------------
      - name: Build test targets
        shell: bash
        run: cmake --build build --target test_unit test_integration

      # ------------------------------------------------------------------
      # 6. Run unit tests (283 tests across 30 suites)
      #    Exit code non-zero → step fails → workflow fails.
      #    set -o pipefail ensures the exit code is preserved through tee.
      # ------------------------------------------------------------------
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          build/tests/test_unit.exe \
            --gtest_output=xml:build/results_unit.xml 2>&1 | tee build/unit_output.txt

      # ------------------------------------------------------------------
      # 7. Run integration tests (12 tests across 2 suites)
      # ------------------------------------------------------------------
      - name: Run integration tests
        shell: bash
        run: |
          set -o pipefail
          build/tests/test_integration.exe \
            --gtest_output=xml:build/results_integration.xml 2>&1 | tee build/integration_output.txt

      # ------------------------------------------------------------------
      # 8. Write test summary to the Actions job summary page
      #    Parses the JUnit XML produced by GTest with Python (pre-installed).
      #    "if: always()" ensures the summary is written even on failure.
      # ------------------------------------------------------------------
      - name: Test summary
        if: always()
        shell: bash
        run: |
          python3 - << 'PYEOF'
          import xml.etree.ElementTree as ET, os, sys

          def parse(path):
              if not os.path.exists(path):
                  return None
              root = ET.parse(path).getroot()
              total    = int(root.get('tests',    0))
              failures = int(root.get('failures', 0)) + int(root.get('errors', 0))
              return {'total': total, 'passed': total - failures, 'failed': failures}

          unit = parse('build/results_unit.xml')
          intg = parse('build/results_integration.xml')

          summary = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if not summary:
              sys.exit(0)

          def row(label, d):
              if d is None:
                  return '| ' + label + ' | - | - | - | not run |\n'
              icon = 'PASS' if d['failed'] == 0 else 'FAIL'
              return ('| ' + label + ' | ' + str(d['total']) + ' | ' +
                      str(d['passed']) + ' | ' + str(d['failed']) + ' | ' + icon + ' |\n')

          total_all  = (unit['total']  if unit else 0) + (intg['total']  if intg else 0)
          passed_all = (unit['passed'] if unit else 0) + (intg['passed'] if intg else 0)
          failed_all = (unit['failed'] if unit else 0) + (intg['failed'] if intg else 0)
          icon_all   = 'PASS' if failed_all == 0 else 'FAIL'

          with open(summary, 'a') as f:
              f.write('## Test Results\n\n')
              f.write('| Suite | Total | Passed | Failed | Status |\n')
              f.write('|-------|------:|-------:|-------:|-------:|\n')
              f.write(row('Unit tests (30 suites)', unit))
              f.write(row('Integration tests (2 suites)', intg))
              f.write('| **Total** | **' + str(total_all) + '** | **' +
                      str(passed_all) + '** | **' + str(failed_all) +
                      '** | **' + icon_all + '** |\n\n')
              f.write('> IEC 62304 Class B -- 100% statement + branch coverage\n')
          PYEOF

      # ------------------------------------------------------------------
      # 9. Upload XML test results as an artifact
      #    Available under Actions → run → Artifacts.
      #    "if: always()" ensures results are uploaded even on failure.
      # ------------------------------------------------------------------
      - name: Upload test results (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: build/results_*.xml
          retention-days: 90
