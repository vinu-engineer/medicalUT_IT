# =====================================================================
# Gated Pipeline — Patient Vital Signs Monitor
#
# Enforced sequence (each stage gates the next via `needs`):
#   1. Build All
#   2. Static Analysis (cppcheck) + SAST (CodeQL)   [parallel]
#   3. Unit & Integration Tests
#   4. Code Coverage
#   5. DVT — Design Verification Report (from stage 3 results)
#   6. Publish Reports (artifact always; GitHub Pages on main only)
#
# Release artifacts are built by release.yml on tag push (v*).
# IEC 62304 Class B — full verification pipeline.
# =====================================================================

name: Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Stage 1 — Build All
  # ═══════════════════════════════════════════════════════════════════
  build:
    name: "1 — Build All"
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory "*"

      - name: Cache GTest (FetchContent)
        uses: actions/cache@v4
        with:
          path: build/_deps
          # Scope by repository: build/_deps/*-subbuild/CMakeCache.txt stores
          # absolute workspace paths, so a cache populated under one repo name
          # poisons builds under another (e.g. after a repo rename).
          key: gtest-${{ github.repository }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: gtest-${{ github.repository }}-

      - name: CMake configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_TESTS=ON \
            -Wno-dev

      - name: Build all targets
        run: cmake --build build

  # ═══════════════════════════════════════════════════════════════════
  # Stage 2a — Static Analysis (cppcheck)
  # ═══════════════════════════════════════════════════════════════════
  static-analysis:
    name: "2a — Static Analysis (cppcheck)"
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck
          cppcheck --version

      - name: Run cppcheck
        run: |
          mkdir -p build
          cppcheck \
            --enable=all \
            --std=c11 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=missingInclude \
            --include=include \
            --xml --xml-version=2 \
            src/vitals.c src/alerts.c src/patient.c \
            src/gui_auth.c src/gui_users.c \
            2> build/cppcheck.xml
          cat build/cppcheck.xml

      - name: Convert cppcheck XML to SARIF
        if: always()
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import json, os, sys

          SEV_TO_LEVEL = {
              'error': 'error', 'warning': 'warning', 'style': 'note',
              'performance': 'note', 'portability': 'warning', 'information': 'none',
          }

          def to_sarif(xml_path, sarif_path):
              if not os.path.exists(xml_path):
                  print(f'No XML at {xml_path}', file=sys.stderr)
                  return 0
              tree = ET.parse(xml_path)
              errors = tree.getroot().findall('.//error')
              rules, results = {}, []
              for err in errors:
                  rule_id  = err.get('id', 'unknown')
                  severity = err.get('severity', 'style')
                  msg      = err.get('msg', '(no message)')
                  verbose  = err.get('verbose', msg)
                  level    = SEV_TO_LEVEL.get(severity, 'note')
                  loc = err.find('location')
                  if loc is None:
                      continue
                  raw_file = loc.get('file', 'unknown').replace('\\', '/')
                  if raw_file.startswith('./'):
                      raw_file = raw_file[2:]
                  line = int(loc.get('line', 1))
                  col  = int(loc.get('column', 1))
                  if rule_id not in rules:
                      rules[rule_id] = {
                          'id': rule_id, 'name': rule_id,
                          'shortDescription': {'text': rule_id},
                          'fullDescription':  {'text': verbose},
                          'defaultConfiguration': {'level': level},
                          'helpUri': 'https://cppcheck.sourceforge.io/',
                      }
                  results.append({
                      'ruleId': rule_id, 'level': level,
                      'message': {'text': msg},
                      'locations': [{'physicalLocation': {
                          'artifactLocation': {'uri': raw_file, 'uriBaseId': '%SRCROOT%'},
                          'region': {'startLine': line, 'startColumn': col}
                      }}]
                  })
              sarif = {
                  'version': '2.1.0',
                  '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',
                  'runs': [{'tool': {'driver': {
                      'name': 'cppcheck',
                      'informationUri': 'https://cppcheck.sourceforge.io/',
                      'rules': list(rules.values())
                  }}, 'results': results}]
              }
              with open(sarif_path, 'w') as f:
                  json.dump(sarif, f, indent=2)
              print(f'Converted {len(results)} finding(s) -> {sarif_path}')
              return len(results)

          to_sarif('build/cppcheck.xml', 'build/cppcheck.sarif')
          PYEOF

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/cppcheck.sarif
          category: cppcheck

  # ═══════════════════════════════════════════════════════════════════
  # Stage 2b — SAST (CodeQL)
  # ═══════════════════════════════════════════════════════════════════
  sast:
    name: "2b — SAST (CodeQL)"
    needs: build
    runs-on: windows-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Fix git safe.directory
        shell: bash
        run: git config --global --add safe.directory "*"

      - uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-extended
          config-file: .github/codeql/codeql-config.yml

      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: gtest-codeql-${{ github.repository }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: gtest-codeql-${{ github.repository }}-

      - name: Build (CodeQL compilation trace)
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_TESTS=ON \
            -Wno-dev
          cmake --build build

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:cpp"

  # ═══════════════════════════════════════════════════════════════════
  # Stage 3 — Unit & Integration Tests
  # ═══════════════════════════════════════════════════════════════════
  tests:
    name: "3 — Unit & Integration Tests"
    needs: [static-analysis, sast]
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory "*"

      - uses: actions/cache@v4
        with:
          path: build/_deps
          key: gtest-${{ github.repository }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: gtest-${{ github.repository }}-

      - name: Build test targets
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_TESTS=ON \
            -Wno-dev
          cmake --build build --target test_unit test_integration

      - name: Run unit tests
        run: |
          set -o pipefail
          build/tests/test_unit.exe \
            --gtest_output=xml:build/results_unit.xml 2>&1 | tee build/unit_output.txt

      - name: Run integration tests
        run: |
          set -o pipefail
          build/tests/test_integration.exe \
            --gtest_output=xml:build/results_integration.xml 2>&1 | tee build/integration_output.txt

      - name: Test summary
        if: always()
        run: |
          python3 - << 'PYEOF'
          import xml.etree.ElementTree as ET, os, sys

          def parse(path):
              if not os.path.exists(path):
                  return None
              root = ET.parse(path).getroot()
              total    = int(root.get('tests',    0))
              failures = int(root.get('failures', 0)) + int(root.get('errors', 0))
              return {'total': total, 'passed': total - failures, 'failed': failures}

          unit = parse('build/results_unit.xml')
          intg = parse('build/results_integration.xml')
          summary = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if not summary:
              sys.exit(0)

          def row(label, d):
              if d is None:
                  return '| ' + label + ' | - | - | - | not run |\n'
              icon = 'PASS' if d['failed'] == 0 else 'FAIL'
              return ('| ' + label + ' | ' + str(d['total']) + ' | ' +
                      str(d['passed']) + ' | ' + str(d['failed']) + ' | ' + icon + ' |\n')

          total_all  = (unit['total']  if unit else 0) + (intg['total']  if intg else 0)
          passed_all = (unit['passed'] if unit else 0) + (intg['passed'] if intg else 0)
          failed_all = (unit['failed'] if unit else 0) + (intg['failed'] if intg else 0)
          icon_all   = 'PASS' if failed_all == 0 else 'FAIL'

          with open(summary, 'a') as f:
              f.write('## Test Results\n\n')
              f.write('| Suite | Total | Passed | Failed | Status |\n')
              f.write('|-------|------:|-------:|-------:|-------:|\n')
              f.write(row('Unit tests', unit))
              f.write(row('Integration tests', intg))
              f.write('| **Total** | **' + str(total_all) + '** | **' +
                      str(passed_all) + '** | **' + str(failed_all) +
                      '** | **' + icon_all + '** |\n')
          PYEOF

      - name: Upload test results (XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: build/results_*.xml
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════
  # Stage 4 — Code Coverage
  #
  # Builds with --coverage, runs tests, then uses gcov directly to
  # parse .gcda/.gcno files and a Python script to produce Cobertura
  # XML + HTML. This avoids gcovr path-matching issues on Windows.
  # ═══════════════════════════════════════════════════════════════════
  coverage:
    name: "4 — Code Coverage"
    needs: tests
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory "*"

      - uses: actions/cache@v4
        with:
          path: build_cov/_deps
          key: gtest-cov-${{ github.repository }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: gtest-cov-${{ github.repository }}-

      - name: Build with coverage instrumentation
        run: |
          cmake -S . -B build_cov -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_TESTS=ON \
            -DENABLE_COVERAGE=ON \
            -Wno-dev
          cmake --build build_cov

      - name: Run tests for coverage data
        run: |
          echo "=== Running unit tests ==="
          ./build_cov/tests/test_unit.exe --gtest_brief=1 2>&1; echo "Exit: $?"
          echo "=== Running integration tests ==="
          ./build_cov/tests/test_integration.exe --gtest_brief=1 2>&1; echo "Exit: $?"

      - name: Generate coverage report
        shell: bash
        run: |
          set +e
          mkdir -p coverage-report
          pip install gcovr 2>&1 | tail -3

          echo "=== .gcno files ==="
          find build_cov -name '*.gcno' 2>/dev/null | head -5 || true
          echo "=== .gcda files ==="
          GCDA_COUNT=$(find build_cov -name '*.gcda' 2>/dev/null | tee /dev/stderr | wc -l)
          echo "Found $GCDA_COUNT .gcda files"

          echo "=== Attempt 1: gcovr with relative paths ==="
          gcovr --root . \
            --search-path build_cov \
            --gcov-executable gcov \
            --filter 'src/' \
            --xml coverage-report/coverage.xml \
            --html-details coverage-report/index.html \
            --print-summary 2>&1 || true

          # Check result
          if [ -f coverage-report/coverage.xml ] && ! grep -q 'lines-valid="0"' coverage-report/coverage.xml 2>/dev/null; then
            echo "=== Coverage generated successfully ==="
            head -3 coverage-report/coverage.xml
          else
            echo "=== Attempt 2: gcovr without filter ==="
            gcovr --root . \
              --search-path build_cov \
              --gcov-executable gcov \
              --xml coverage-report/coverage.xml \
              --html-details coverage-report/index.html \
              --print-summary 2>&1 || true
          fi

          # Placeholder if everything failed
          if [ ! -s coverage-report/coverage.xml ]; then
            echo '<?xml version="1.0"?><coverage line-rate="0" branch-rate="0"><packages/></coverage>' > coverage-report/coverage.xml
          fi
          if [ ! -f coverage-report/index.html ]; then
            echo '<html><body><h1>Coverage unavailable</h1></body></html>' > coverage-report/index.html
          fi
          ls -la coverage-report/

      - name: Coverage summary
        if: always()
        run: |
          python3 - << 'PYEOF'
          import xml.etree.ElementTree as ET, os, sys
          path = 'coverage-report/coverage.xml'
          if not os.path.exists(path):
              sys.exit(0)
          root = ET.parse(path).getroot()
          line_rate   = float(root.get('line-rate',   0)) * 100
          branch_rate = float(root.get('branch-rate', 0)) * 100
          summary = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if not summary:
              sys.exit(0)
          with open(summary, 'a') as f:
              f.write('## Code Coverage\n\n')
              f.write('| Metric | Coverage |\n')
              f.write('|--------|--------:|\n')
              f.write(f'| Line coverage | {line_rate:.1f}% |\n')
              f.write(f'| Branch coverage | {branch_rate:.1f}% |\n')
          PYEOF

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_number }}
          path: coverage-report/
          retention-days: 90

  # ═══════════════════════════════════════════════════════════════════
  # Stage 5 — DVT (Design Verification Tests)
  #
  # Builds the final GUI executable, launches it, and runs automated
  # black-box tests against the running application using pywinauto.
  # This is SYSTEM-LEVEL verification — NOT unit/integration tests.
  # ═══════════════════════════════════════════════════════════════════
  dvt:
    name: "5 — DVT"
    needs: coverage
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - run: git config --global --add safe.directory "*"

      - uses: actions/cache@v4
        with:
          path: build_dvt/_deps
          key: gtest-dvt-${{ github.repository }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: gtest-dvt-${{ github.repository }}-

      - name: Build GUI executable for DVT
        run: |
          cmake -S . -B build_dvt -G Ninja \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DBUILD_TESTS=OFF \
            -Wno-dev
          cmake --build build_dvt --target patient_monitor_gui

      - name: Run DVT GUI automation
        run: |
          pip install pywinauto
          python dvt/automation/run_dvt.py build_dvt/patient_monitor_gui.exe
        continue-on-error: true

      - name: Download unit/integration test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: dvt/results

      - name: Generate DVT report
        run: |
          python3 - << 'PYEOF'
          import os, datetime, xml.etree.ElementTree as ET

          date_str = datetime.datetime.utcnow().strftime("%Y-%m-%d_%H%M%S")
          report_path = f"dvt/results/dvt_report_{date_str}.txt"

          def parse_gtest_xml(path):
              try:
                  tree = ET.parse(path)
                  root = tree.getroot()
                  tests  = int(root.attrib.get("tests",  0))
                  fails  = int(root.attrib.get("failures", 0))
                  errors = int(root.attrib.get("errors", 0))
                  return tests, tests - fails - errors, fails + errors
              except Exception:
                  return 0, 0, -1

          u_total, u_pass, u_fail = parse_gtest_xml("dvt/results/results_unit.xml")
          i_total, i_pass, i_fail = parse_gtest_xml("dvt/results/results_integration.xml")
          overall = "PASS" if (u_fail == 0 and i_fail == 0) else "FAIL"

          lines = [
              "=" * 72,
              "  PATIENT VITAL SIGNS MONITOR — DVT REPORT",
              f"  Generated  : {datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S')} UTC",
              f"  Repository : {os.environ.get('GITHUB_REPOSITORY', 'local')}",
              f"  Commit     : {os.environ.get('GITHUB_SHA', 'local')[:12]}",
              f"  Ref        : {os.environ.get('GITHUB_REF', 'local')}",
              "=" * 72, "",
              "AUTOMATED TEST RESULTS", "-" * 72,
              f"  Unit tests        : {u_pass:3d} / {u_total:3d} passed   {'PASS' if u_fail==0 else 'FAIL'}",
              f"  Integration tests : {i_pass:3d} / {i_total:3d} passed   {'PASS' if i_fail==0 else 'FAIL'}",
              f"  Total             : {u_pass+i_pass:3d} / {u_total+i_total:3d} passed",
              "", f"  OVERALL RESULT    : {overall}",
              "", "PASS CRITERIA", "-" * 72,
              f"  Unit pass rate 100%       : {'PASS' if u_fail==0 else 'FAIL'} ({u_pass}/{u_total})",
              f"  Integration pass rate 100%: {'PASS' if i_fail==0 else 'FAIL'} ({i_pass}/{i_total})",
              "", "NOTES", "-" * 72,
              "  GUI checklist (DVT_Protocol.md S4) requires manual verification.",
              "  Static analysis: see static-analysis workflow results.",
              "  SAST: see codeql workflow results.", "",
              "  Referenced protocol : dvt/DVT_Protocol.md (DVT-001-REV-A)",
              "  Traceability matrix : requirements/TRACEABILITY.md",
              "=" * 72,
          ]
          report_text = "\n".join(lines)
          print(report_text)
          os.makedirs("dvt/results", exist_ok=True)
          with open(report_path, "w") as f:
              f.write(report_text + "\n")
          print(f"\nReport written to: {report_path}")
          PYEOF

      - name: DVT summary
        if: always()
        run: |
          python3 - << 'PYEOF'
          import os, json, glob

          # Read GUI automation results (the REAL DVT)
          dvt_json = sorted(glob.glob("dvt/results/dvt_results_*.json"))
          gui_tests = []
          if dvt_json:
              with open(dvt_json[-1]) as f:
                  data = json.load(f)
                  gui_tests = data.get("tests", [])

          gui_pass = sum(1 for t in gui_tests if t["status"] == "PASS")
          gui_fail = sum(1 for t in gui_tests if t["status"] == "FAIL")
          gui_total = len(gui_tests)
          overall = "PASS" if gui_fail == 0 and gui_total > 0 else "FAIL"

          summary = "## DVT — Design Verification Results\n\n"
          summary += f"**Overall: {overall}** ({gui_pass}/{gui_total} GUI tests passed)\n\n"
          summary += "| Test ID | SWR | Description | Result |\n"
          summary += "|---------|-----|-------------|--------|\n"
          for t in gui_tests:
              summary += f"| {t['id']} | {t['swr']} | {t['description']} | {t['status']} |\n"

          if not gui_tests:
              summary += "| — | — | No GUI automation results found | FAIL |\n"

          summary += f"\n> Protocol: `dvt/DVT_Protocol.md` (DVT-001-REV-A)\n"
          summary += f"> Unit/integration tests: see Stage 3 results\n"

          sumfile = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if sumfile:
              with open(sumfile, "a") as f:
                  f.write(summary)
          print(summary)
          PYEOF

      - name: Upload DVT results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dvt-results-${{ github.sha }}
          path: dvt/results/
          retention-days: 90

      - name: Check pass criteria
        run: |
          python3 - << 'PYEOF'
          import json, glob, sys, os, xml.etree.ElementTree as ET

          # Check GUI automation results (primary DVT)
          dvt_json = sorted(glob.glob("dvt/results/dvt_results_*.json"))
          if dvt_json:
              with open(dvt_json[-1]) as f:
                  data = json.load(f)
              passed = data.get("pass_count", 0)
              failed = data.get("fail_count", 0)
              print(f"DVT GUI Automation: {passed} passed, {failed} failed")
              if failed > 0:
                  print("DVT FAIL: GUI tests failed")
                  sys.exit(1)
              print("DVT PASS: all GUI tests passed")
          else:
              print("WARNING: GUI automation did not produce results (headless CI)")
              print("Falling back to unit/integration test verification")
              # Verify unit/integration tests passed (from stage 3 artifacts)
              for xml_path in glob.glob("dvt/results/results_*.xml"):
                  try:
                      root = ET.parse(xml_path).getroot()
                      fails = int(root.get("failures","0")) + int(root.get("errors","0"))
                      tests = int(root.get("tests","0"))
                      name = os.path.basename(xml_path)
                      print(f"  {name}: {tests} tests, {fails} failures")
                      if fails > 0:
                          print("DVT FAIL")
                          sys.exit(1)
                  except Exception as e:
                      print(f"  Error reading {xml_path}: {e}")
              print("DVT PASS (unit/integration verified; GUI automation pending)")
          PYEOF

  # Note: Release artifacts are built via .github/workflows/release.yml
  # (manual workflow_dispatch). This avoids duplicate pipeline runs when
  # a tag is pushed to the same commit that's already on main.

  # ═══════════════════════════════════════════════════════════════════
  # Reports — Publish test, coverage, and analysis reports
  # Deploys to GitHub Pages (free for public repos)
  # View at: https://<owner>.github.io/<repo>/
  # ═══════════════════════════════════════════════════════════════════
  publish-reports:
    name: "6 — Publish Reports"
    needs: dvt
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download coverage report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-${{ github.run_number }}
          path: site/coverage

      - name: Download test results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: site/test-results

      - name: Download DVT results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dvt-results-${{ github.sha }}
          path: site/dvt

      - name: Ensure site directories exist
        run: |
          mkdir -p site/coverage site/test-results site/dvt
          find site -type f | head -40 || echo "(no files yet)"

      - name: Generate index page
        run: |
          python3 - << 'PYEOF'
          import os, datetime, xml.etree.ElementTree as ET, glob

          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          # Find test results (search for files regardless of nesting)
          unit_t = unit_p = unit_f = 0
          intg_t = intg_p = intg_f = 0
          for xml_file in glob.glob('site/test-results/**/results_*.xml', recursive=True):
              if os.path.exists(xml_file):
                  root = ET.parse(xml_file).getroot()
                  t = int(root.get('tests', 0))
                  f = int(root.get('failures', 0)) + int(root.get('errors', 0))
                  if 'unit' in xml_file:
                      unit_t, unit_p, unit_f = t, t - f, f
                  else:
                      intg_t, intg_p, intg_f = t, t - f, f

          # Find coverage XML (search regardless of nesting)
          cov_line = cov_branch = 0.0
          for cov_xml in glob.glob('site/coverage/**/coverage.xml', recursive=True):
              if os.path.exists(cov_xml):
                  root = ET.parse(cov_xml).getroot()
                  cov_line = float(root.get('line-rate', 0)) * 100
                  cov_branch = float(root.get('branch-rate', 0)) * 100
                  break

          # Find coverage HTML report link (search regardless of nesting)
          cov_html = ""
          for f in glob.glob('site/coverage/**/index.html', recursive=True):
              cov_html = os.path.relpath(f, 'site')
              break
          if not cov_html:
              cov_html = "coverage/"

          total_t = unit_t + intg_t
          total_f = unit_f + intg_f
          test_status = "PASS" if total_f == 0 else "FAIL"

          html = f"""<!DOCTYPE html>
          <html lang="en"><head>
          <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
          <title>Patient Vital Signs Monitor — CI Reports</title>
          <style>
            body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                   max-width: 900px; margin: 0 auto; padding: 2rem; background: #f8fafc; }}
            h1 {{ color: #1e3a8a; border-bottom: 3px solid #1e3a8a; padding-bottom: .5rem; }}
            h2 {{ color: #334155; margin-top: 2rem; }}
            table {{ border-collapse: collapse; width: 100%; margin: 1rem 0; }}
            th, td {{ border: 1px solid #cbd5e1; padding: .5rem 1rem; text-align: left; }}
            th {{ background: #1e3a8a; color: white; }}
            tr:nth-child(even) {{ background: #f1f5f9; }}
            .pass {{ color: #16a34a; font-weight: bold; }}
            .fail {{ color: #dc2626; font-weight: bold; }}
            a {{ color: #2563eb; }}
            .card {{ background: white; border-radius: 8px; padding: 1.5rem;
                     box-shadow: 0 1px 3px rgba(0,0,0,.1); margin: 1rem 0; }}
            .metric {{ font-size: 2rem; font-weight: bold; color: #1e3a8a; }}
            .grid {{ display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; }}
          </style></head><body>
          <h1>Patient Vital Signs Monitor</h1>
          <p>IEC 62304 Class B — CI/CD Report Dashboard</p>
          <p><em>Last updated: {now}</em></p>

          <div class="grid">
            <div class="card">
              <div class="metric">{total_t - total_f}/{total_t}</div>
              <div>Tests Passing</div>
              <div class="{'pass' if total_f == 0 else 'fail'}">{test_status}</div>
            </div>
            <div class="card">
              <div class="metric">{cov_line:.1f}%</div>
              <div>Line Coverage</div>
            </div>
            <div class="card">
              <div class="metric">{cov_branch:.1f}%</div>
              <div>Branch Coverage</div>
            </div>
          </div>

          <h2>Test Results</h2>
          <table>
            <tr><th>Suite</th><th>Total</th><th>Passed</th><th>Failed</th><th>Status</th></tr>
            <tr><td>Unit tests</td><td>{unit_t}</td><td>{unit_p}</td><td>{unit_f}</td>
                <td class="{'pass' if unit_f==0 else 'fail'}">{'PASS' if unit_f==0 else 'FAIL'}</td></tr>
            <tr><td>Integration tests</td><td>{intg_t}</td><td>{intg_p}</td><td>{intg_f}</td>
                <td class="{'pass' if intg_f==0 else 'fail'}">{'PASS' if intg_f==0 else 'FAIL'}</td></tr>
            <tr><th>Total</th><th>{total_t}</th><th>{total_t - total_f}</th><th>{total_f}</th>
                <th class="{'pass' if total_f==0 else 'fail'}">{test_status}</th></tr>
          </table>

          <h2>Code Coverage</h2>
          <table>
            <tr><th>Metric</th><th>Value</th></tr>
            <tr><td>Line coverage</td><td>{cov_line:.1f}%</td></tr>
            <tr><td>Branch coverage</td><td>{cov_branch:.1f}%</td></tr>
          </table>
          <p><a href="{cov_html}">Detailed Coverage Report (HTML)</a></p>

          <h2>Reports</h2>
          <ul>
            <li><a href="{cov_html}">Coverage — HTML detail</a></li>
            <li><a href="dvt/">DVT — Design Verification results</a></li>
            <li><a href="test-results/">Test — JUnit XML results</a></li>
          </ul>

          <hr>
          <p><small>Generated by the <a href="https://github.com/vinu-dev/medvital-monitor">Pipeline</a> workflow.</small></p>
          </body></html>"""

          with open('site/index.html', 'w') as f:
              f.write(html)
          print(f"Report index generated. Coverage HTML: {cov_html}")
          print(f"Coverage: {cov_line:.1f}% line, {cov_branch:.1f}% branch")
          print(f"Tests: {total_t} total, {total_f} failed")
          PYEOF

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-report-${{ github.run_number }}
          path: site/
          retention-days: 90

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
