# =====================================================================
# Static Analysis — cppcheck
#
# Tool   : cppcheck (open-source, GPLv3)
# Scope  : Core library (vitals.c, alerts.c, patient.c, gui_auth.c,
#          gui_users.c) — Win32 GUI files are excluded; they are
#          verified by structured GUI demonstration per IEC 62304 §5.6.3.
#
# Rules enabled (--enable=all minus noise):
#   warning     — bugs: null-deref, uninitialised vars, buffer overflow
#   style       — code quality: redundant code, missing braces, etc.
#   performance — performance anti-patterns (e.g. postfix ++ on objects)
#   portability — undefined/implementation-defined behaviour (C standard)
#   information — meta-issues: missing includes, incomplete analysis
#   unusedFunction suppressed — GUI callbacks are invoked by the Windows
#                               message loop, not by direct call
#   missingIncludeSystem suppressed — system headers not shipped in repo
#
# Output : SARIF → Security → Code Scanning tab (same tab as CodeQL)
#          Job summary table (Actions run page)
#
# Platform: ubuntu-latest — cppcheck parses C without compiling, so no
#           Windows toolchain is needed for the non-Win32 source files.
#
# IEC 62304 §5.5.4: static analysis is a required verification activity
# for Class B software.
# =====================================================================

name: Static Analysis (cppcheck)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '30 3 * * 1'   # Every Monday 03:30 UTC (30 min after CodeQL)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cppcheck:
    name: cppcheck — C static analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to Code Scanning
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # Install cppcheck
      # ----------------------------------------------------------------
      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck
          cppcheck --version

      # ----------------------------------------------------------------
      # Run cppcheck — XML output (v2) for reliable machine parsing
      # Analyse the five core library files; suppress noise from Win32
      # platform ifdefs that are never evaluated on Linux.
      # ----------------------------------------------------------------
      - name: Run cppcheck
        run: |
          mkdir -p build
          cppcheck \
            --enable=all \
            --std=c11 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --suppress=missingInclude \
            --include=include \
            --xml \
            --xml-version=2 \
            src/vitals.c \
            src/alerts.c \
            src/patient.c \
            src/gui_auth.c \
            src/gui_users.c \
            2> build/cppcheck.xml
          echo "--- cppcheck raw output ---"
          cat build/cppcheck.xml

      # ----------------------------------------------------------------
      # Convert cppcheck XML → SARIF 2.1.0
      # GitHub Code Scanning requires SARIF; cppcheck only outputs XML.
      # The converter maps cppcheck severities to SARIF levels:
      #   error       → error
      #   warning     → warning
      #   style       → note
      #   performance → note
      #   portability → warning
      #   information → none
      # ----------------------------------------------------------------
      - name: Convert cppcheck XML to SARIF
        if: always()
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import json, os, sys

          SEV_TO_LEVEL = {
              'error':       'error',
              'warning':     'warning',
              'style':       'note',
              'performance': 'note',
              'portability': 'warning',
              'information': 'none',
          }

          def to_sarif(xml_path, sarif_path):
              if not os.path.exists(xml_path):
                  print(f'No XML found at {xml_path}', file=sys.stderr)
                  return 0

              tree = ET.parse(xml_path)
              root = tree.getroot()
              errors = root.findall('.//error')

              rules   = {}
              results = []

              for err in errors:
                  rule_id  = err.get('id', 'unknown')
                  severity = err.get('severity', 'style')
                  msg      = err.get('msg', '(no message)')
                  verbose  = err.get('verbose', msg)
                  level    = SEV_TO_LEVEL.get(severity, 'note')

                  # First <location> element gives the primary site
                  loc = err.find('location')
                  if loc is None:
                      continue

                  raw_file = loc.get('file', 'unknown')
                  # Make path relative and use forward slashes
                  raw_file = raw_file.replace('\\', '/')
                  # Strip leading './' if present
                  if raw_file.startswith('./'):
                      raw_file = raw_file[2:]

                  line = int(loc.get('line', 1))
                  col  = int(loc.get('column', 1))

                  # Register rule once
                  if rule_id not in rules:
                      rules[rule_id] = {
                          'id': rule_id,
                          'name': rule_id,
                          'shortDescription': {'text': rule_id},
                          'fullDescription':  {'text': verbose},
                          'defaultConfiguration': {'level': level},
                          'helpUri': 'https://cppcheck.sourceforge.io/',
                      }

                  results.append({
                      'ruleId': rule_id,
                      'level': level,
                      'message': {'text': msg},
                      'locations': [{
                          'physicalLocation': {
                              'artifactLocation': {
                                  'uri': raw_file,
                                  'uriBaseId': '%SRCROOT%'
                              },
                              'region': {
                                  'startLine':   line,
                                  'startColumn': col
                              }
                          }
                      }]
                  })

              sarif = {
                  'version': '2.1.0',
                  '$schema': 'https://json.schemastore.org/sarif-2.1.0.json',
                  'runs': [{
                      'tool': {
                          'driver': {
                              'name': 'cppcheck',
                              'informationUri': 'https://cppcheck.sourceforge.io/',
                              'rules': list(rules.values())
                          }
                      },
                      'results': results
                  }]
              }

              with open(sarif_path, 'w') as f:
                  json.dump(sarif, f, indent=2)

              print(f'Converted {len(results)} finding(s) → {sarif_path}')
              return len(results)

          count = to_sarif('build/cppcheck.xml', 'build/cppcheck.sarif')
          sys.exit(0)   # always succeed — findings are informational
          PYEOF

      # ----------------------------------------------------------------
      # Write analysis summary to the Actions job summary page
      # ----------------------------------------------------------------
      - name: Analysis summary
        if: always()
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET, os, sys

          xml_path = 'build/cppcheck.xml'
          if not os.path.exists(xml_path):
              sys.exit(0)

          errors = ET.parse(xml_path).getroot().findall('.//error')
          by_sev = {}
          for e in errors:
              s = e.get('severity', 'unknown')
              by_sev[s] = by_sev.get(s, 0) + 1

          total = sum(by_sev.values())
          status = 'PASS (no findings)' if total == 0 else str(total) + ' finding(s)'

          summary = os.environ.get('GITHUB_STEP_SUMMARY', '')
          if not summary:
              sys.exit(0)

          sev_order = ['error','warning','portability','performance','style','information']

          with open(summary, 'a') as f:
              f.write('## Static Analysis Results (cppcheck)\n\n')
              f.write('**Scope:** `vitals.c` `alerts.c` `patient.c` `gui_auth.c` `gui_users.c`\n\n')
              if total == 0:
                  f.write('**No findings** -- all checks passed.\n\n')
              else:
                  f.write('| Severity | Count |\n')
                  f.write('|----------|------:|\n')
                  for sev in sev_order:
                      if sev in by_sev:
                          f.write('| ' + sev + ' | ' + str(by_sev[sev]) + ' |\n')
                  f.write('| **Total** | **' + str(total) + '** |\n\n')
                  f.write('> See **Security -> Code Scanning** for full details with source locations.\n\n')
              f.write('> Suppressions: `unusedFunction`, `missingIncludeSystem`, `missingInclude`\n')
          PYEOF

      # ----------------------------------------------------------------
      # Upload SARIF to GitHub Code Scanning
      # Results appear in Security → Code Scanning alongside CodeQL.
      # "if: always()" ensures upload even when findings exist.
      # ----------------------------------------------------------------
      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/cppcheck.sarif
          category: cppcheck
