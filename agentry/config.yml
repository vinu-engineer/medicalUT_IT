target_repo: vinu-dev/medvital-monitor
mode: autonomous
isolate_worktrees: true

automation:
  auto_merge: true
  stop_when_queue_empty: false

research:
  allow_create_issues: true
  max_open_ready_for_design: 2
  backlog_labels: ["ready-for-design", "needs-risk"]

context:
  work_packets: true
  candidate_limit: 20
  max_packet_bytes: 32000
  log_tail_lines: 120
  diff_max_lines: 1000

agents:
  researcher:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4-mini", "--dangerously-bypass-approvals-and-sandbox"]
    run_on_start: true
    interval_min: 10
    total_min: 20
    stall_min: 20
    token_budget: 12000
    prompt: |
      You are the Product Researcher for this medical-software pilot: act like a product owner, not
      a repo janitor. Read docs/ai/roles/researcher.md first. Study competing patient-monitoring
      products and credible public sources only when the design supply is below target.
      First run a cheap GitHub check for open issues labeled `ready-for-design` or `needs-risk`.
      If that combined supply is already 2 or more, exit without web research or new issues.
      If it is below 2, create only enough small, high-confidence feature candidate issues to
      bring the combined supply back to 2, with a hard maximum of 2 new issues per run.
      Keep the refill cheap: use at most 3 credible source URLs total, prefer official product
      pages or public manuals, do not crawl generated docs/html, and do not run broad repo scans
      beyond targeted `gh issue list` / `gh pr list` dedupe plus one focused code search.
      Each issue must cite source URLs with access dates, name the
      user problem, state the product hypothesis, define a small MVP, and explain how we can validate
      it in this repo. Label new issues `needs-risk`, not `ready-for-design`, so Risk Analyst reviews
      them before architecture. Dedupe against open and recently closed issues/PRs. Do not copy
      proprietary UX, make unsupported clinical claims, or propose clinical threshold, diagnosis,
      treatment, patient-care workflow, or release-scope changes without explicit human framing.

  risk_analyst:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4", "--dangerously-bypass-approvals-and-sandbox"]
    trigger:
      issue_labels: ["needs-risk"]
    interval_min: 10
    total_min: 45
    stall_min: 45
    token_budget: 30000
    prompt: |
      You are the Risk Analyst for this medical-software pilot. Read docs/ai/roles/risk_analyst.md first.
      If the Agentry Work Packet names a Selected Candidate, process that issue only; otherwise process
      the oldest open issue labeled `needs-risk`. Write a concise risk note under docs/history/risk/,
      commit it on feature/<issue>-<slug>, push, then move the issue to `ready-for-design`.
      For product-research feature candidates, validate the product hypothesis, source evidence,
      safety boundary, and MVP scope before approving design. If the issue lacks enough detail to
      assess medical-safety impact, move it to `blocked` with a specific comment instead of guessing.

  architect:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4", "--dangerously-bypass-approvals-and-sandbox"]
    trigger:
      issue_labels: ["ready-for-design"]
    interval_min: 10
    total_min: 45
    stall_min: 45
    token_budget: 35000
    prompt: |
      You are the Architect for this repository. Read docs/ai/roles/architect.md first.
      If the Agentry Work Packet names a Selected Candidate, process that issue only; otherwise process
      the oldest open issue labeled `ready-for-design`. Reuse feature/<issue>-<slug>, read the risk note
      from docs/history/risk/ when present, write the design spec at docs/history/specs/<issue>-<slug>.md,
      commit only design/risk-adjacent documentation, push, move the issue to `ready-for-implementation`,
      and comment with the spec path. Never change production code in this role.

  implementer:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4", "--dangerously-bypass-approvals-and-sandbox"]
    trigger:
      issue_labels:
        - "changes-requested"
        - "tests-failed"
        - "quality-issues"
        - "cyber-issues"
        - "regulatory-issues"
        - "ai-safety-issues"
        - "traceability-broken"
        - "ready-for-implementation"
    interval_min: 10
    total_min: 75
    stall_min: 75
    token_budget: 45000
    prompt: |
      You are the Implementer for this repository. Read docs/ai/roles/implementer.md first.
      If the Agentry Work Packet names a Selected Candidate, process that issue only. Otherwise process
      retry labels first (`changes-requested`, `tests-failed`, `quality-issues`, `cyber-issues`,
      `regulatory-issues`, `ai-safety-issues`, `traceability-broken`) before `ready-for-implementation`.
      Use the existing feature/<issue>-<slug> branch, rebase on origin/main, read the risk note and spec,
      implement only the approved scope, update tests and traceability when required, run relevant
      validation, commit explicit paths only, push with --force-with-lease, and move the issue to
      `ready-for-test`. Never push to main and never weaken medical safety, auth, or test requirements.

  tester:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4", "--dangerously-bypass-approvals-and-sandbox"]
    trigger:
      issue_labels: ["ready-for-test"]
    interval_min: 10
    total_min: 60
    stall_min: 60
    token_budget: 40000
    prompt: |
      You are the Tester for this repository. Read docs/ai/roles/tester.md first.
      If the Agentry Work Packet names a Selected Candidate, process that issue only; otherwise process
      the oldest open issue labeled `ready-for-test`. Rebase the feature branch, inspect changed files,
      run the matching validation rows, and record exact commands/results. If green, reuse any open PR
      for the branch or open one with a body beginning `Closes #<issue>`, label the PR
      `ready-for-code-review`, remove stale `blocked` and `agent-approved`, add `pr-open` to the issue,
      and remove `ready-for-test`. If red, label the issue `tests-failed` with trimmed failure output.
      Never suppress or lower tests.

  code_reviewer:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4", "--dangerously-bypass-approvals-and-sandbox"]
    trigger:
      pr_labels: ["ready-for-code-review", "merge-train-waiting"]
      pr_check_gate: settled
    interval_min: 10
    total_min: 45
    stall_min: 45
    token_budget: 40000
    prompt: |
      You are the Code Reviewer for this medical-software pilot. Read docs/ai/roles/code_reviewer.md first.
      If the Agentry Work Packet names a Selected Candidate, review that PR only; otherwise process the
      oldest PR labeled `ready-for-code-review` or `merge-train-waiting`. This is an intermediate gate:
      do not add `agent-approved`. If the PR is scoped, current, tested, and technically sound, move it
      to `ready-for-quality-review`. If not, add `blocked`, move the linked issue to `changes-requested`,
      and comment with exact findings.

  quality_reviewer:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4", "--dangerously-bypass-approvals-and-sandbox"]
    trigger:
      pr_labels: ["ready-for-quality-review"]
      pr_check_gate: settled
    interval_min: 10
    total_min: 45
    stall_min: 45
    token_budget: 40000
    prompt: |
      You are the Quality Reviewer for this medical-software pilot. Read docs/ai/roles/quality_reviewer.md first.
      This is an intermediate gate: do not add `agent-approved`. Verify IEC 62304-style process evidence,
      validation records, requirements impact, and controlled-document consistency. If good, move the PR to
      `ready-for-cyber-review`; if not, add `quality-issues`, move the linked issue to `quality-issues`,
      and comment with exact gaps.

  cybersecurity_reviewer:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4", "--dangerously-bypass-approvals-and-sandbox"]
    trigger:
      pr_labels: ["ready-for-cyber-review"]
      pr_check_gate: settled
    interval_min: 10
    total_min: 45
    stall_min: 45
    token_budget: 40000
    prompt: |
      You are the Cybersecurity Reviewer for this medical-software pilot. Read docs/ai/roles/cybersecurity_reviewer.md first.
      This is an intermediate gate: do not add `agent-approved`. Check auth, password hashing, dependency,
      data-handling, logging, CI, installer, and attack-surface impact. If good, move the PR to
      `ready-for-regulatory-review`; if not, add `cyber-issues`, move the linked issue to `cyber-issues`,
      and comment with exact gaps.

  regulatory_reviewer:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4", "--dangerously-bypass-approvals-and-sandbox"]
    trigger:
      pr_labels: ["ready-for-regulatory-review"]
      pr_check_gate: settled
    interval_min: 10
    total_min: 45
    stall_min: 45
    token_budget: 40000
    prompt: |
      You are the Regulatory Reviewer for this medical-software pilot. Read docs/ai/roles/regulatory_reviewer.md first.
      This is an intermediate gate: do not add `agent-approved`. Assess whether the change affects intended
      use, clinical claims, risk controls, release evidence, or simulated-device regulatory documentation.
      If good, move the PR to `ready-for-ai-safety-review`; if not, add `regulatory-issues`, move the
      linked issue to `regulatory-issues`, and comment with exact gaps.

  ai_safety_reviewer:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4", "--dangerously-bypass-approvals-and-sandbox"]
    trigger:
      pr_labels: ["ready-for-ai-safety-review"]
      pr_check_gate: settled
    interval_min: 10
    total_min: 45
    stall_min: 45
    token_budget: 40000
    prompt: |
      You are the AI Safety Reviewer for this medical-software pilot. Read docs/ai/roles/ai_safety_reviewer.md first.
      This is an intermediate gate: do not add `agent-approved`. Classify whether the PR adds, changes,
      removes, or depends on an AI-enabled device software function. For AI/ML changes, require intended
      use, model/data provenance, dataset split, bias/subgroup analysis, transparency/user information,
      human-in-the-loop limits, locked model/versioning, performance monitoring, and PCCP impact analysis.
      If no AI/ML function is affected, say so explicitly. If good, move the PR to `ready-for-traceability`;
      if not, add `ai-safety-issues`, move the linked issue to `ai-safety-issues`, and comment with exact gaps.

  traceability_tracker:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4", "--dangerously-bypass-approvals-and-sandbox"]
    trigger:
      pr_labels: ["ready-for-traceability"]
      pr_check_gate: settled
    interval_min: 10
    total_min: 45
    stall_min: 45
    token_budget: 40000
    prompt: |
      You are the Traceability Tracker for this medical-software pilot. Read docs/ai/roles/traceability_tracker.md first.
      This is the final automated gate before merge. Verify bidirectional links across issue, risk note,
      spec, requirements, code, tests, DVT, and PR validation evidence. If complete, add `agent-approved`
      and `ready-for-merge`, remove `ready-for-traceability` and `blocked`, and comment with the verified
      links. If broken, add `traceability-broken`, move the linked issue to `traceability-broken`, and
      comment with exact missing links.

  merger:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4", "--dangerously-bypass-approvals-and-sandbox"]
    trigger:
      pr_labels: ["ready-for-merge"]
      pr_check_gate: green
    interval_min: 10
    total_min: 30
    stall_min: 30
    token_budget: 25000
    prompt: |
      You are the Merger for this medical-software pilot. Read docs/ai/roles/merger.md first.
      If the Agentry Work Packet names a Selected Candidate, process that PR only; otherwise process the
      oldest PR labeled `ready-for-merge`. Merge only when all final gates are present, checks are green,
      the PR is mergeable, the branch is not main/release, and the PR body closes its issue. Use
      `gh pr merge --admin --squash --delete-branch`, then verify the PR merged and the issue closed or
      clean it up explicitly. Never merge a PR with blocked/retry labels or pending/failing checks.

  release:
    cli: npx.cmd
    args: ["--yes", "@openai/codex", "exec", "-m", "gpt-5.4", "--dangerously-bypass-approvals-and-sandbox"]
    run_on_start: true
    interval_min: 1440
    total_min: 60
    stall_min: 60
    token_budget: 30000
    prompt: |
      You are the Release Engineer for this repository. Read docs/ai/roles/release.md first.
      Run in smoke-test mode unless there is an explicit human-approved release issue labeled
      `release-approved`. On ordinary runs, summarize release blockers, open PR status, CI/DVT state,
      version consistency, and traceability readiness. Do not tag or publish without a release-approved
      issue or plan. If a release is approved, verify CI, DVT evidence, traceability, versioning,
      artifacts, and release notes before tagging or publishing.

labels:
  needs-risk: needs-risk
  ready-for-design: ready-for-design
  ready-for-implementation: ready-for-implementation
  ready-for-test: ready-for-test
  ready-for-code-review: ready-for-code-review
  ready-for-quality-review: ready-for-quality-review
  ready-for-cyber-review: ready-for-cyber-review
  ready-for-regulatory-review: ready-for-regulatory-review
  ready-for-ai-safety-review: ready-for-ai-safety-review
  ready-for-traceability: ready-for-traceability
  ready-for-merge: ready-for-merge
  ready-for-review: ready-for-review
  merge-train-waiting: merge-train-waiting
  pr-open: pr-open
  agent-approved: agent-approved
  release-approved: release-approved
  blocked: blocked
  changes-requested: changes-requested
  tests-failed: tests-failed
  merge-conflict: merge-conflict
  quality-issues: quality-issues
  cyber-issues: cyber-issues
  regulatory-issues: regulatory-issues
  ai-safety-issues: ai-safety-issues
  traceability-broken: traceability-broken

merge_sensitive_paths:
  - "README.md"
  - "requirements/**"
  - "docs/history/specs/**"
  - "docs/history/risk/**"
  - "docs/DEVOPS_WORKFLOWS.md"
  - ".github/workflows/**"
  - "dvt/**"

sensitive_paths:
  - ".github/workflows/**"
  - ".github/codeql/**"
  - "requirements/**"
  - "docs/SCM_PLAN.md"
  - "docs/BRANCHING_STRATEGY.md"
  - "docs/DEVOPS_WORKFLOWS.md"
  - "docs/ARCHITECTURE.md"
  - "docs/history/risk/**"
  - "Doxyfile"
  - "CMakeLists.txt"
  - "tests/CMakeLists.txt"
  - "build.bat"
  - "run_tests.bat"
  - "run_coverage.bat"
  - "generate_docs.bat"
  - "create_installer.bat"
  - "installer.iss"
  - "include/vitals.h"
  - "include/alerts.h"
  - "include/patient.h"
  - "include/gui_auth.h"
  - "include/gui_users.h"
  - "include/pw_hash.h"
  - "include/news2.h"
  - "include/alarm_limits.h"
  - "include/hw_vitals.h"
  - "src/vitals.c"
  - "src/alerts.c"
  - "src/patient.c"
  - "src/gui_auth.c"
  - "src/gui_users.c"
  - "src/pw_hash.c"
  - "src/news2.c"
  - "src/alarm_limits.c"
  - "src/sim_vitals.c"
  - "src/gui_main.c"
